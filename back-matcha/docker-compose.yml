version: '3.1'

services:
  db:
    image: postgres:14.1
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4.8.1
    restart: always
    ports:
      - 8080:8080

volumes:
  pgdata:
    name: 'pgdata'
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './pgdata'